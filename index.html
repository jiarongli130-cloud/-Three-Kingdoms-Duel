            --bg-color: #0a0a0a;

            --accent-red: #ff3131;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle, #1b1b1b 1px, transparent 1px);
            background-size: 30px 30px;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.3s; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid var(--text-color);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        h1 { text-align: center; color: var(--accent-orange); text-shadow: 2px 2px #000; border-bottom: 2px solid var(--accent-orange); padding-bottom: 10px; }
        .controls { display: flex; flex-wrap: wrap; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .select-group { flex: 1; min-width: 200px; }
        select, button {
            background: #000; color: var(--text-color); border: 1px solid var(--text-color);
            padding: 10px; font-size: 16px; cursor: pointer; width: 100%;
        }
        button:hover { background: var(--text-color); color: #000; }
        .btn-random { color: var(--accent-orange); border-color: var(--accent-orange); }
        .battle-view { display: flex; justify-content: space-between; margin-top: 20px; }
        .fighter { width: 45%; text-align: center; border: 1px solid #333; padding: 10px; background: var(--panel-bg); }
        .hp-bar-container { width: 100%; height: 25px; background: #222; border: 1px solid #444; margin-top: 10px; position: relative; }
        .hp-bar { height: 100%; width: 100%; transition: width 0.3s ease; }
        .p1-hp { background: linear-gradient(90deg, #00ff41, #008f11); }
        .p2-hp { background: linear-gradient(90deg, #ff3131, #8b0000); }
        #battleLog {
            height: 250px; overflow-y: auto; background: #000; border: 1px solid #333;
            padding: 10px; margin-top: 20px; font-size: 14px; line-height: 1.6;
            color: #ccc; border-left: 4px solid var(--accent-orange);
        }
        .chart-container { margin-top: 20px; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #333; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #555; }
    </style>
</head>

<div class="container" id="mainWarroom">

        "使出一招【龍吟突刺】，虛空震顫！",
        "發動【青龍擺尾】，沉重的打擊撼動了數據底層！",
        "進入【數據溢位】狀態，瘋狂連斬！",
        "施展【神經元超載打擊】，對方邏輯出現短路！",
        "橫掃千軍，產生強烈的數據擾動！",

        "發動【絕境爆發】，戰力瞬間溢出！"

    const p1Select = document.getElementById('p1Select');
    const p2Select = document.getElementById('p2Select');
    const battleLog = document.getElementById('battleLog');
    let hpChart;

    // 按武力排序載入下拉選單
    const sortedGenerals = [...generals].sort((a, b) => b.power - a.power);
    sortedGenerals.forEach((g) => {
        let opt1 = new Option(`${g.name} (${g.power}) - ${g.rank}`, generals.indexOf(g));
        let opt2 = new Option(`${g.name} (${g.power}) - ${g.rank}`, generals.indexOf(g));
        p1Select.add(opt1);
        p2Select.add(opt2);
    });

    function randomize() {
        p1Select.selectedIndex = Math.floor(Math.random() * generals.length);
        p2Select.selectedIndex = Math.floor(Math.random() * generals.length);
        battleLog.innerHTML = "天道已選定隨機將領。";
    }

    function initChart() {
        const ctx = document.getElementById('hpChart').getContext('2d');
        if (hpChart) hpChart.destroy();
        hpChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [0],
                datasets: [
                    { label: '先鋒 HP', data: [100], borderColor: '#00ff41', tension: 0.1 },
                    { label: '敵將 HP', data: [100], borderColor: '#ff3131', tension: 0.1 }
                ]
            },
            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
        });
    }

    function triggerShake() {
        const warroom = document.getElementById('mainWarroom');
        warroom.classList.add('shaking');
        setTimeout(() => warroom.classList.remove('shaking'), 300);
    }

    async function startDuel() {
        const p1 = generals[p1Select.value];
        const p2 = generals[p2Select.value];
        document.getElementById('p1Name').innerText = p1.name;
        document.getElementById('p1Rank').innerText = p1.rank;
        document.getElementById('p2Name').innerText = p2.name;
        document.getElementById('p2Rank').innerText = p2.rank;

        let h1 = 100, h2 = 100;
        let round = 1;
        battleLog.innerHTML = `[系統啟動] 正在處決：${p1.name} VS ${p2.name}<br>`;
        initChart();

        while (h1 > 0 && h2 > 0 && round < 50) {
            await new Promise(r => setTimeout(r, 400));
            let dmg1 = Math.max(2, (p1.power * 0.1) - (p2.power * 0.03) + (Math.random() * 10 - 2));
            let dmg2 = Math.max(2, (p2.power * 0.1) - (p1.power * 0.03) + (Math.random() * 10 - 2));

            if (Math.random() > 0.5) {
                h2 -= dmg1;
                battleLog.innerHTML += `<span style="color:var(--text-color)">[第${round}合]</span> ${p1.name} ${moves[Math.floor(Math.random()*moves.length)]} 造成 ${Math.floor(dmg1)} 傷害。<br>`;
                triggerShake();
            } else {
                h1 -= dmg2;
                battleLog.innerHTML += `<span style="color:var(--accent-red)">[第${round}合]</span> ${p2.name} 咆哮猛攻，${p1.name} 損血 ${Math.floor(dmg2)}。<br>`;
                triggerShake();
            }

            h1 = Math.max(0, h1); h2 = Math.max(0, h2);
            document.getElementById('p1HpBar').style.width = h1 + "%";
            document.getElementById('p2HpBar').style.width = h2 + "%";
            document.getElementById('p1HpText').innerText = Math.floor(h1) + "/100";
            document.getElementById('p2HpText').innerText = Math.floor(h2) + "/100";
            hpChart.data.labels.push(round);
            hpChart.data.datasets[0].data.push(h1);
            hpChart.data.datasets[1].data.push(h2);
            hpChart.update();
            battleLog.scrollTop = battleLog.scrollHeight;
            round++;
        }
        const winner = h1 > h2 ? p1.name : p2.name;
        battleLog.innerHTML += `<br><strong style="color:var(--accent-orange); font-size:18px;">[數據處決完畢] 獲勝：${winner}！</strong>`;
    }
    initChart();
