    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff41;
            --accent-orange: #ff8c00;
            --accent-red: #ff3131;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle, #1b1b1b 1px, transparent 1px);
            background-size: 30px 30px;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.3s; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid var(--text-color);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        h1 { text-align: center; color: var(--accent-orange); text-shadow: 2px 2px #000; border-bottom: 2px solid var(--accent-orange); padding-bottom: 10px; }
        .controls { display: flex; flex-wrap: wrap; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .select-group { flex: 1; min-width: 200px; }
        select, button, input {
            background: #000; color: var(--text-color); border: 1px solid var(--text-color);
            padding: 10px; font-size: 16px; cursor: pointer; width: 100%; box-sizing: border-box;
        }
        button:hover { background: var(--text-color); color: #000; }
        .btn-random { color: var(--accent-orange); border-color: var(--accent-orange); }
        .btn-tournament { background: #4b0082; color: #fff; border-color: #8a2be2; font-weight: bold; text-shadow: 0 0 5px #fff; box-shadow: 0 0 10px #4b0082; }
        .btn-tournament:hover { background: #8a2be2; color: #fff; box-shadow: 0 0 20px #8a2be2;}
        .team-selects select { margin-bottom: 5px; font-size: 14px; padding: 5px; }
        .battle-view { display: flex; justify-content: space-between; margin-top: 20px; }
        .fighter { width: 45%; text-align: center; padding: 10px; background: var(--panel-bg); }
        .hp-bar-container { width: 100%; height: 25px; background: #222; margin-top: 10px; position: relative; }
        .hp-bar { height: 100%; width: 100%; transition: width 0.3s ease; }
        .p1-hp { background: linear-gradient(90deg, #00ff41, #008f11); }
        .p2-hp { background: linear-gradient(90deg, #ff3131, #8b0000); }
        #battleLog {
            height: 350px; overflow-y: auto; background: #000; border: 1px solid #333;
            padding: 15px; margin-top: 20px; font-size: 14px; line-height: 1.6;
            color: #ccc; border-left: 4px solid var(--accent-orange); scroll-behavior: smooth;
        }
        .chart-container { margin-top: 20px; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #333; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #555; }

</head>

</div>

    function updateDropdowns() {
        p1Select.innerHTML = ''; p2Select.innerHTML = '';
        const tourneySelect = document.getElementById('tourneySelect');
        if(tourneySelect) tourneySelect.innerHTML = '';
        
        const teamSelects = [
            document.getElementById('tA0'), document.getElementById('tA1'), document.getElementById('tA2'),
            document.getElementById('tA3'), document.getElementById('tA4'), document.getElementById('tA5'),
            document.getElementById('tB0'), document.getElementById('tB1'), document.getElementById('tB2'),
            document.getElementById('tB3'), document.getElementById('tB4'), document.getElementById('tB5'),
            document.getElementById('dragonSelect')
        ];
        teamSelects.forEach(sel => { if(sel) sel.innerHTML = ''; });

        const tigerSelects = [
            document.getElementById('tT0'), document.getElementById('tT1'), document.getElementById('tT2'),
            document.getElementById('tT3'), document.getElementById('tT4'), document.getElementById('tT5'),
            document.getElementById('tT6'), document.getElementById('tT7'), document.getElementById('tT8'),
            document.getElementById('tT9')
        ];
        tigerSelects.forEach(sel => { 
            if(sel) { sel.innerHTML = ''; sel.add(new Option("[--- 無/不參戰 ---]", -1)); }
        });

        const sortedGenerals = [...generals].sort((a, b) => b.power - a.power);
        sortedGenerals.forEach((g) => {
            let idx = generals.indexOf(g);
            let optStr = `${g.name} (${g.power}) - ${g.rank}`;
            p1Select.add(new Option(optStr, idx));
            p2Select.add(new Option(optStr, idx));
            if(tourneySelect) tourneySelect.add(new Option(optStr, idx));
            teamSelects.forEach(sel => { if(sel) sel.add(new Option(optStr, idx)); });
            tigerSelects.forEach(sel => { if(sel) sel.add(new Option(optStr, idx)); });
        });
    }
    
    updateDropdowns();

    function addCustomGeneral() {
        const nameInput = document.getElementById('customName').value.trim();
        const powerInput = parseInt(document.getElementById('customPower').value);
        const rankInput = document.getElementById('customRank').value.trim() || "異界降臨";
        if (!nameInput || isNaN(powerInput) || powerInput < 1 || powerInput > 99999) return;
        generals.push({ name: nameInput, power: powerInput, rank: rankInput });
        updateDropdowns();
        battleLog.innerHTML += `<br><span style="color:#ffd700; font-weight:bold; font-size:16px;">⚡ 【天道異象】異界武將降臨！「${nameInput}」已加入沙盤！</span><br><br>`;
        battleLog.scrollTop = battleLog.scrollHeight;
    }

    function randomize() {
        p1Select.selectedIndex = Math.floor(Math.random() * generals.length);
        p2Select.selectedIndex = Math.floor(Math.random() * generals.length);
        battleLog.innerHTML = "天道已選定隨機將領。";
    }

    function randomizeTeam() {
        let indices = [];
        while(indices.length < 12) {
            let r = Math.floor(Math.random() * generals.length);
            if(!indices.includes(r)) indices.push(r);
        }
        for(let i=0; i<6; i++) {
            document.getElementById('tA'+i).value = indices[i];
            document.getElementById('tB'+i).value = indices[i+6];
        }
        battleLog.innerHTML += `<br><span style="color:#00ffff; font-weight:bold;">🎲 天道已為雙方軍團配置 12 名隨機猛將！</span><br>`;
        battleLog.scrollTop = battleLog.scrollHeight;
    }

    function randomizeOneVsN() {
        let currentDragonIdx = parseInt(document.getElementById('dragonSelect').value);
        let indices = [];
        while(indices.length < 10) {
            let r = Math.floor(Math.random() * generals.length);
            if(!indices.includes(r) && r !== currentDragonIdx) indices.push(r);
        }
        for(let i=0; i<10; i++) document.getElementById('tT'+i).value = indices[i];
        battleLog.innerHTML += `<br><span style="color:#ffd700; font-weight:bold;">🎲 天道已為當前狂龍，隨機指派了 10 名群虎對手！</span><br>`;
        battleLog.scrollTop = battleLog.scrollHeight;
    }

    function addToTournament() {
        if(tourneyRosterData.length >= 12) return;
        let idx = parseInt(document.getElementById('tourneySelect').value);
        if(tourneyRosterData.includes(idx)) return;
        tourneyRosterData.push(idx);
        document.getElementById('tourneyRoster').innerText = `十二強指定名單 (${tourneyRosterData.length}/12)：${tourneyRosterData.map(i => generals[i].name).join("、")}`;
    }

    function clearTournament() { tourneyRosterData = []; document.getElementById('tourneyRoster').innerText = `十二強指定名單 (0/12)：無`; }

    function initChart() {
        const ctx = document.getElementById('hpChart').getContext('2d');
        if (hpChart) hpChart.destroy();
        hpChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [0], datasets: [{ label: '先鋒 HP', data: [100], borderColor: '#00ff41', tension: 0.1 }, { label: '敵方 HP', data: [100], borderColor: '#ff3131', tension: 0.1 }] },
            options: { responsive: true, scales: { y: { min: 0, max: 100 } }, animation: false }
        });
    }

    async function startDuel(isTournamentMode = false) {
        const p1 = generals[p1Select.value];
        const p2 = generals[p2Select.value];
        const p1ActualPower = p1.name === "趙雲" ? p1.power + 20 : p1.power;
        const p2ActualPower = p2.name === "趙雲" ? p2.power + 20 : p2.power;

        document.getElementById('p1Name').innerText = p1.name;
        document.getElementById('p1Rank').innerText = p1.rank;
        document.getElementById('p2Name').innerText = p2.name;
        document.getElementById('p2Rank').innerText = p2.rank;

        let h1 = 100, h2 = 100;
        let round = 1;
        let p1Ult30Used = false, p1Ult10Used = false, p2Ult30Used = false, p2Ult10Used = false;
        let p1DodgeCount = 0, p2DodgeCount = 0;

        if (!isTournamentMode) battleLog.innerHTML = `[對決啟動] ${p1.name} VS ${p2.name}<br>`;
        initChart();

        while (h1 > 0 && h2 > 0 && round < 80) {
            await new Promise(r => setTimeout(r, isTournamentMode ? 100 : 350));
            let atkPct1 = h1, atkPct2 = h2;

            if (p1.name === "趙雲" && atkPct1 <= 10 && h1 > 0 && !p1Ult10Used && h2 > 0) {
                p1Ult10Used = true; h2 = 0; 
                battleLog.innerHTML += `<br><span style="color:#ffffff; font-weight:bold; font-size:20px;">❄️ 【真・武神絕境】${p1.name} 發動【玥之極】！${p2.name} 瞬間被抹除！</span><br><br>`;
                triggerShake();
            }
            else if (p2.name === "趙雲" && atkPct2 <= 10 && h2 > 0 && !p2Ult10Used && h1 > 0) {
                p2Ult10Used = true; h1 = 0; 
                battleLog.innerHTML += `<br><span style="color:#ffffff; font-weight:bold; font-size:20px;">❄️ 【真・武神絕境】敵將 ${p2.name} 發動【玥之極】！${p1.name} 瞬間被抹除！</span><br><br>`;
                triggerShake();
            }

            // 1v1 的 AOE 同樣觸發，只是目標只有一個
            if (p1.name === "趙雲" && atkPct1 <= 36 && h1 > 10 && !p1Ult30Used && h2 > 0) {
                p1Ult30Used = true; 
                battleLog.innerHTML += `<br><span style="color:#00ffff; font-weight:bold; font-size:18px;">🐉 【武神降世】${p1.name} 發動全螢幕 AOE【九天龍吟驚寰宇】！全域貫穿！</span><br>`;
                if (p2DodgeCount > 0) {
                    p2DodgeCount--;
                    battleLog.innerHTML += `<span style="color:#aaaaaa;">💨 ${p2.name} 極限閃避了 AOE 貫穿！</span><br><br>`;
                } else {
                    h2 -= 50; 
                    battleLog.innerHTML += `<span style="color:#ffcc00; font-weight:bold;">🔥 龍吟貫穿！${p2.name} 慘遭重創（-50 HP）！</span><br><br>`;
                }
                triggerShake();
            }
            else if (p2.name === "趙雲" && atkPct2 <= 36 && h2 > 10 && !p2Ult30Used && h1 > 0) {
                p2Ult30Used = true; 
                battleLog.innerHTML += `<br><span style="color:#00ffff; font-weight:bold; font-size:18px;">🐉 【武神降世】敵將 ${p2.name} 發動全螢幕 AOE【九天龍吟驚寰宇】！全域貫穿！</span><br>`;
                if (p1DodgeCount > 0) {
                    p1DodgeCount--;
                    battleLog.innerHTML += `<span style="color:#aaaaaa;">💨 ${p1.name} 極限閃避了 AOE 貫穿！</span><br><br>`;
                } else {
                    h1 -= 50; 
                    battleLog.innerHTML += `<span style="color:#ffcc00; font-weight:bold;">🔥 龍吟貫穿！${p1.name} 慘遭重創（-50 HP）！</span><br><br>`;
                }
                triggerShake();
            }

            if (h1 > 0 && h2 > 0) {
                let dmg1 = Math.max(3, (p1ActualPower * 0.12) - (p2ActualPower * 0.04) + (Math.random() * 12 - 4));
                let dmg2 = Math.max(3, (p2ActualPower * 0.12) - (p1ActualPower * 0.04) + (Math.random() * 12 - 4));
                
                if (Math.random() > 0.5) {
                    h2 -= dmg1;
                    battleLog.innerHTML += `<span style="color:var(--text-color)">[第${round}合]</span> ${p1.name} 攻擊造成 ${Math.floor(dmg1)} 點損傷。<br>`;
                } else {
                    h1 -= dmg2;
                    battleLog.innerHTML += `<span style="color:var(--accent-red)">[第${round}合]</span> ${p2.name} 攻擊造成 ${Math.floor(dmg2)} 點破壞。<br>`;
                }
                triggerShake();
            }

            h1 = Math.max(0, h1); h2 = Math.max(0, h2);
            document.getElementById('p1HpBar').style.width = h1 + "%";
            document.getElementById('p2HpBar').style.width = h2 + "%";
            hpChart.data.labels.push(round); hpChart.data.datasets[0].data.push(h1); hpChart.data.datasets[1].data.push(h2); hpChart.update();
            battleLog.scrollTop = battleLog.scrollHeight; round++;
        }
        if (!isTournamentMode) battleLog.innerHTML += `<br><strong style="color:var(--accent-orange); font-size:22px;">[演武終結] 最終處決結果：${h1 > h2 ? p1.name : p2.name} 傲立戰場！</strong>`;
        return h1 > h2 ? parseInt(p1Select.value) : parseInt(p2Select.value);
    }

    // ==============================================================
    // 1 VS N 一龍鬥群虎 推演模組 (含趙雲特製 Buff)
    // ==============================================================
    async function runOneVsN() {
        const dIdx = parseInt(document.getElementById('dragonSelect').value);
        const tIdxs = [];
        for(let i=0; i<10; i++) {
            let val = parseInt(document.getElementById('tT'+i).value);
            if(!isNaN(val) && val >= 0) tIdxs.push(val);
        }
        if(tIdxs.length < 2) return;

        const dGen = generals[dIdx];
        const dActualPower = dGen.name === "趙雲" ? dGen.power + 20 : dGen.power;
        let fighters = [];
        
        // 狂龍無額外加成，新增 ult10Count (玥之極發動次數)
        fighters.push({ id: 'D', team: 'A', name: dGen.name, power: dGen.power, rank: dGen.rank, actualPower: dActualPower, hp: 100, maxHp: 100, dodgeCount: 0, ult10Count: 0, ult30Used: false, isDead: false, color: '#00ff41' });
        
        for(let i=0; i<tIdxs.length; i++) {
            let g = generals[tIdxs[i]];
            fighters.push({ id: 'T'+i, team: 'B', name: g.name, power: g.power, rank: g.rank, actualPower: g.name === "趙雲" ? g.power + 20 : g.power, hp: 100, maxHp: 100, dodgeCount: 0, ult10Count: 0, ult30Used: false, isDead: false, color: '#ff3131' });
        }

        document.getElementById('p1Name').innerText = "狂龍: " + dGen.name;
        document.getElementById('p2Name').innerText = `群虎陣營 (${tIdxs.length}人)`;
        
        const totalTigersHp = tIdxs.length * 100;
        function update1vNBars() {
            let dragon = fighters[0];
            let tigersHp = fighters.filter(f=>f.team==='B').reduce((s,f)=>s+f.hp,0);
            document.getElementById('p1HpBar').style.width = (dragon.hp/dragon.maxHp*100) + "%";
            document.getElementById('p2HpBar').style.width = (tigersHp/totalTigersHp*100) + "%";
        }

        update1vNBars();
        battleLog.innerHTML = `<h2 style="color:#ffd700; text-align:center;">🐉 一龍鬥群虎 (1 VS ${tIdxs.length} 純淨極限戰) 🐅</h2>`;
        await new Promise(r => setTimeout(r, 1000));
        let round = 1; initChart();

        while(fighters[0].hp > 0 && fighters.filter(f=>f.team==='B' && !f.isDead).length > 0 && round < 1000) {
            await new Promise(r => setTimeout(r, 200)); 
            
            let alive = fighters.filter(f => !f.isDead);
            let attacker = alive[Math.floor(Math.random() * alive.length)];
            let targets = alive.filter(f => f.team !== attacker.team);
            let defender = targets[Math.floor(Math.random() * targets.length)];

            let atkColor = attacker.color; let defColor = defender.color;
            let atkPct = (attacker.hp / attacker.maxHp) * 100;

            // 玥之極 10 次限制 (被群毆專屬)
            if (attacker.name === "趙雲" && atkPct <= 10 && attacker.ult10Count < 10) {
                attacker.ult10Count++;
                defender.hp = 0; defender.isDead = true;
                battleLog.innerHTML += `<br><span style="color:#ffffff; font-weight:bold; font-size:18px;">❄️ 【真・武神絕境】(第 ${attacker.ult10Count} 次) <span style="color:${atkColor}">${attacker.name}</span> 發動【玥之極】！<span style="color:${defColor}">${defender.name}</span> 瞬間被抹除！</span><br>`;
                triggerShake();
            }
            // 九天龍吟驚寰宇 AOE (全體貫穿)
            else if (attacker.name === "趙雲" && atkPct <= 36 && !attacker.ult30Used) {
                attacker.ult30Used = true;
                battleLog.innerHTML += `<br><span style="color:#00ffff; font-weight:bold; font-size:18px;">🐉 【武神爆發】<span style="color:${atkColor}">${attacker.name}</span> 發動全螢幕 AOE【九天龍吟驚寰宇】！龍膽之威震懾全場！</span><br>`;
                targets.forEach(t => {
                    t.hp -= 50;
                    battleLog.innerHTML += `<span style="color:#ffcc00; font-weight:bold;">🔥 龍吟貫穿！<span style="color:${t.color}">${t.name}</span> 慘遭重創（-50 HP）！</span><br>`;
                    if(t.hp <= 0) { t.hp = 0; t.isDead = true; battleLog.innerHTML += `<span style="color:#ff3131; font-weight:bold;">🩸 [陣亡] <span style="color:${t.color}">${t.name}</span> 被龍吟震碎代碼！</span><br>`; }
                });
                triggerShake();
            }
            else {
                let dmg = Math.max(3, (attacker.actualPower * 0.12) - (defender.actualPower * 0.04) + (Math.random() * 12 - 4));
                let eventRand = Math.random();
                
                // 趙雲被群毆時：高機率閃避與格擋
                if (defender.name === "趙雲" && defender.team === 'A') {
                    if (eventRand < 0.40) { // 40% Dodge
                        battleLog.innerHTML += `<span style="color:#00ffff;">[極限圍剿] 💨 雲龍九現！<span style="color:${defColor}">${defender.name}</span> 以高頻殘影完美閃躲了 <span style="color:${atkColor}">${attacker.name}</span> 的攻擊！</span><br>`;
                    } else if (eventRand < 0.70) { // 30% Perfect Parry
                        battleLog.innerHTML += `<span style="color:#ffd700;">[極限圍剿] 🛡️ 槍出如龍！<span style="color:${defColor}">${defender.name}</span> 【無傷】彈反了 <span style="color:${atkColor}">${attacker.name}</span> 的殺招！</span><br>`;
                        triggerShake();
                    } else if (eventRand < 0.90) { // 20% Block
                        dmg = Math.floor(dmg * 0.2); defender.hp -= dmg;
                        battleLog.innerHTML += `<span style="color:#b0c4de;">[極限圍剿] 🛡️ 龍膽格擋！<span style="color:${defColor}">${defender.name}</span> 穩如泰山，僅承受 ${Math.floor(dmg)} 點擦傷。</span><br>`;
                        triggerShake();
                    } else { // 10% Get hit
                        defender.hp -= dmg;
                        battleLog.innerHTML += `<span style="color:${atkColor}">[極限圍剿]</span> <span style="color:${atkColor}">${attacker.name}</span> 突破殘影！對 <span style="color:${defColor}">${defender.name}</span> 造成 ${Math.floor(dmg)} 點損傷。<br>`;
                        triggerShake();
                    }
                } else {
                    // 普通武將防禦邏輯
                    if (eventRand < 0.12) {
                        battleLog.innerHTML += `<span style="color:#aaaaaa;">[圍剿] 💨 敏捷如風！<span style="color:${defColor}">${defender.name}</span> 閃躲了攻擊！</span><br>`;
                    } else if (eventRand < 0.35) {
                        dmg = Math.floor(dmg * 0.4); defender.hp -= dmg;
                        battleLog.innerHTML += `<span style="color:#b0c4de;">[圍剿] 🛡️ 成功格擋，承受 ${Math.floor(dmg)} 點震傷。</span><br>`;
                    } else {
                        defender.hp -= dmg;
                        battleLog.innerHTML += `<span style="color:${atkColor}">[圍剿]</span> <span style="color:${atkColor}">${attacker.name}</span> 對 <span style="color:${defColor}">${defender.name}</span> 造成 ${Math.floor(dmg)} 點損傷。<br>`;
                    }
                }
                
                if (defender.hp <= 0) {
                    defender.hp = 0; defender.isDead = true;
                    battleLog.innerHTML += `<span style="color:#ff3131; font-weight:bold; border-bottom: 1px solid #555; display:block; padding-bottom:5px; margin-bottom:5px;">🩸 [陣亡] <span style="color:${defColor}">${defender.name}</span> 倒在了血泊中...</span>`;
                }
            }

            update1vNBars();
            hpChart.data.labels.push(round); hpChart.data.datasets[0].data.push( fighters[0].hp / fighters[0].maxHp * 100 ); hpChart.data.datasets[1].data.push( fighters.filter(f=>f.team==='B').reduce((s,f)=>s+f.hp,0) / totalTigersHp * 100 ); hpChart.update();
            battleLog.scrollTop = battleLog.scrollHeight; round++;
        }

        if (!fighters[0].isDead) {
            battleLog.innerHTML += `<br><div style="text-align:center; padding:20px; border: 2px solid #ffd700;"><h1 style="color:#ffd700;">【一龍破陣 霸業達成】</h1><h2 style="color:#ffffff;">🐉 狂龍 ${fighters[0].name} 🐉</h2><p style="color:#ccc;">以一己凡人之軀，成功反殺 ${tIdxs.length} 名群虎！這才是真正的天下第一武神！</p></div><br><br>`;
        } else {
            battleLog.innerHTML += `<br><div style="text-align:center; padding:20px; border: 2px solid #ff3131;"><h1 style="color:#ff3131;">【群虎噬龍 慘烈落幕】</h1><p style="color:#ccc;">狂龍寡不敵眾，在殘酷的圍剿中力竭而亡...</p></div><br><br>`;
        }
        battleLog.scrollTop = battleLog.scrollHeight;
    }

    // ==============================================================
    // 6v6 同場大亂鬥 推演模組 (含趙雲特製 Buff)
    // ==============================================================
    async function runGroupMeleeBattle() {
        const teamA_idxs = [ parseInt(document.getElementById('tA0').value), parseInt(document.getElementById('tA1').value), parseInt(document.getElementById('tA2').value), parseInt(document.getElementById('tA3').value), parseInt(document.getElementById('tA4').value), parseInt(document.getElementById('tA5').value) ];
        const teamB_idxs = [ parseInt(document.getElementById('tB0').value), parseInt(document.getElementById('tB1').value), parseInt(document.getElementById('tB2').value), parseInt(document.getElementById('tB3').value), parseInt(document.getElementById('tB4').value), parseInt(document.getElementById('tB5').value) ];
        if (teamA_idxs.includes(NaN) || teamB_idxs.includes(NaN)) return;

        let fighters = [];
        for(let i=0; i<6; i++) fighters.push({ id: 'A'+i, team: 'A', name: generals[teamA_idxs[i]].name, actualPower: generals[teamA_idxs[i]].name === "趙雲" ? generals[teamA_idxs[i]].power + 20 : generals[teamA_idxs[i]].power, hp: 100, maxHp: 100, dodgeCount: 0, ult10Count: 0, ult30Used: false, isDead: false, color: '#00ff41' });
        for(let i=0; i<6; i++) fighters.push({ id: 'B'+i, team: 'B', name: generals[teamB_idxs[i]].name, actualPower: generals[teamB_idxs[i]].name === "趙雲" ? generals[teamB_idxs[i]].power + 20 : generals[teamB_idxs[i]].power, hp: 100, maxHp: 100, dodgeCount: 0, ult10Count: 0, ult30Used: false, isDead: false, color: '#ff3131' });

        document.getElementById('p1Name').innerText = "青龍陣營"; document.getElementById('p2Name').innerText = "赤虎陣營";
        const totalMaxHp = 600;
        function updateTeamBars() {
            document.getElementById('p1HpBar').style.width = (fighters.filter(f=>f.team==='A').reduce((s,f)=>s+f.hp,0)/totalMaxHp*100) + "%";
            document.getElementById('p2HpBar').style.width = (fighters.filter(f=>f.team==='B').reduce((s,f)=>s+f.hp,0)/totalMaxHp*100) + "%";
        }
        updateTeamBars();

        battleLog.innerHTML = `<h2 style="color:#ff3131; text-align:center;">🔥 6 VS 6 史詩大亂鬥 🔥</h2>`;
        await new Promise(r => setTimeout(r, 1000));
        let round = 1; initChart();
        
        while(fighters.filter(f=>f.team==='A' && !f.isDead).length > 0 && fighters.filter(f=>f.team==='B' && !f.isDead).length > 0 && round < 300) {
            await new Promise(r => setTimeout(r, 200)); 
            let alive = fighters.filter(f => !f.isDead);
            let attacker = alive[Math.floor(Math.random() * alive.length)];
            let targets = alive.filter(f => f.team !== attacker.team);
            let defender = targets[Math.floor(Math.random() * targets.length)];
            let atkColor = attacker.color; let defColor = defender.color;
            let atkPct = (attacker.hp / attacker.maxHp) * 100;

            if (attacker.name === "趙雲" && atkPct <= 10 && attacker.ult10Count < 10) {
                attacker.ult10Count++; defender.hp = 0; defender.isDead = true;
                battleLog.innerHTML += `<br><span style="color:#ffffff; font-weight:bold;">❄️ 【真・武神絕境】(第 ${attacker.ult10Count} 次) <span style="color:${atkColor}">${attacker.name}</span> 發動【玥之極】！<span style="color:${defColor}">${defender.name}</span> 瞬間被抹除！</span><br>`;
                triggerShake();
            }
            else if (attacker.name === "趙雲" && atkPct <= 36 && !attacker.ult30Used) {
                attacker.ult30Used = true;
                battleLog.innerHTML += `<br><span style="color:#00ffff; font-weight:bold; font-size:18px;">🐉 【武神爆發】<span style="color:${atkColor}">${attacker.name}</span> 發動全螢幕 AOE【九天龍吟驚寰宇】！龍膽之威震懾全場！</span><br>`;
                targets.forEach(t => {
                    t.hp -= 50;
                    battleLog.innerHTML += `<span style="color:#ffcc00; font-weight:bold;">🔥 龍吟貫穿！<span style="color:${t.color}">${t.name}</span> 慘遭重創（-50 HP）！</span><br>`;
                    if(t.hp <= 0) { t.hp = 0; t.isDead = true; battleLog.innerHTML += `<span style="color:#ff3131; font-weight:bold;">🩸 [陣亡] <span style="color:${t.color}">${t.name}</span> 被龍吟震碎！</span><br>`; }
                });
                triggerShake();
            }
            else {
                let dmg = Math.max(3, (attacker.actualPower * 0.12) - (defender.actualPower * 0.04) + (Math.random() * 12 - 4));
                let eventRand = Math.random();
                
                // 趙雲混戰被圍毆防禦機制
                if (defender.name === "趙雲" && targets.length >= 2) { 
                    if (eventRand < 0.40) {
                        battleLog.innerHTML += `<span style="color:#00ffff;">[亂鬥] 💨 雲龍九現！<span style="color:${defColor}">${defender.name}</span> 完美閃躲了 <span style="color:${atkColor}">${attacker.name}</span> 的攻擊！</span><br>`;
                    } else if (eventRand < 0.70) {
                        battleLog.innerHTML += `<span style="color:#ffd700;">[亂鬥] 🛡️ 槍出如龍！<span style="color:${defColor}">${defender.name}</span> 【無傷】彈反了攻擊！</span><br>`;
                    } else if (eventRand < 0.90) {
                        dmg = Math.floor(dmg * 0.2); defender.hp -= dmg;
                        battleLog.innerHTML += `<span style="color:#b0c4de;">[亂鬥] 🛡️ 龍膽格擋！<span style="color:${defColor}">${defender.name}</span> 僅承受 ${Math.floor(dmg)} 點擦傷。</span><br>`;
                    } else {
                        defender.hp -= dmg;
                        battleLog.innerHTML += `<span style="color:${atkColor}">[亂鬥]</span> <span style="color:${atkColor}">${attacker.name}</span> 對 <span style="color:${defColor}">${defender.name}</span> 造成 ${Math.floor(dmg)} 點損傷。<br>`;
                    }
                } else {
                    if (eventRand < 0.12) { battleLog.innerHTML += `<span style="color:#aaaaaa;">[亂鬥] 💨 <span style="color:${defColor}">${defender.name}</span> 閃躲了攻擊！</span><br>`; }
                    else if (eventRand < 0.35) { dmg = Math.floor(dmg * 0.4); defender.hp -= dmg; battleLog.innerHTML += `<span style="color:#b0c4de;">[亂鬥] 🛡️ 格擋承受 ${Math.floor(dmg)} 點損傷。</span><br>`; }
                    else { defender.hp -= dmg; battleLog.innerHTML += `<span style="color:${atkColor}">[亂鬥]</span> <span style="color:${atkColor}">${attacker.name}</span> 對 <span style="color:${defColor}">${defender.name}</span> 造成 ${Math.floor(dmg)} 點損傷。<br>`; }
                }

                if (defender.hp <= 0) {
                    defender.hp = 0; defender.isDead = true;
                    battleLog.innerHTML += `<span style="color:#ff3131; font-weight:bold; border-bottom: 1px solid #555; display:block; padding-bottom:5px; margin-bottom:5px;">🩸 [陣亡] <span style="color:${defColor}">${defender.name}</span> 倒在了血泊中...</span>`;
                }
            }
            updateTeamBars();
            hpChart.data.labels.push(round); hpChart.data.datasets[0].data.push(fighters.filter(f=>f.team==='A').reduce((s,f)=>s+f.hp,0)/6); hpChart.data.datasets[1].data.push(fighters.filter(f=>f.team==='B').reduce((s,f)=>s+f.hp,0)/6); hpChart.update();
            battleLog.scrollTop = battleLog.scrollHeight; round++;
        }
        battleLog.innerHTML += `<h2 style="color:#ffd700; text-align:center;">大亂鬥結束！</h2>`;
        battleLog.scrollTop = battleLog.scrollHeight;
    }
</script>
