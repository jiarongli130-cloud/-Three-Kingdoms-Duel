    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff41;
            --accent-orange: #ff8c00;
            --accent-red: #ff3131;
            --panel-bg: rgba(20, 20, 20, 0.9);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle, #1b1b1b 1px, transparent 1px);
            background-size: 30px 30px;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.3s; }
        .container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid var(--text-color);
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        h1 { text-align: center; color: var(--accent-orange); text-shadow: 2px 2px #000; border-bottom: 2px solid var(--accent-orange); padding-bottom: 10px; }
        .controls { display: flex; flex-wrap: wrap; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .select-group { flex: 1; min-width: 200px; }
        select, button {
            background: #000; color: var(--text-color); border: 1px solid var(--text-color);
            padding: 10px; font-size: 16px; cursor: pointer; width: 100%;
        }
        button:hover { background: var(--text-color); color: #000; }
        .btn-random { color: var(--accent-orange); border-color: var(--accent-orange); }
        .battle-view { display: flex; justify-content: space-between; margin-top: 20px; }
        .fighter { width: 45%; text-align: center; border: 1px solid #333; padding: 10px; background: var(--panel-bg); }
        .hp-bar-container { width: 100%; height: 25px; background: #222; border: 1px solid #444; margin-top: 10px; position: relative; }
        .hp-bar { height: 100%; width: 100%; transition: width 0.3s ease; }
        .p1-hp { background: linear-gradient(90deg, #00ff41, #008f11); }
        .p2-hp { background: linear-gradient(90deg, #ff3131, #8b0000); }
        #battleLog {
            height: 250px; overflow-y: auto; background: #000; border: 1px solid #333;
            padding: 10px; margin-top: 20px; font-size: 14px; line-height: 1.6;
            color: #ccc; border-left: 4px solid var(--accent-orange);
        }
        .chart-container { margin-top: 20px; background: rgba(0,0,0,0.5); padding: 10px; border: 1px solid #333; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #555; }
        #p2Name { color: var(--accent-red); }
    </style>
</head>
<body>
<div class="container" id="mainWarroom">
    <h1>三國武神演武沙盤 // 541+9 數據處決</h1>
    <div class="controls">
        <div class="select-group">

            <label>敵軍將領：</label>

        </div>
    </div>
    <div class="controls">

    <div class="battle-view">
        <div class="fighter">

            <div id="p1Rank" style="font-size:12px; color:#888;">等級</div>
            <div class="hp-bar-container"><div id="p1HpBar" class="hp-bar p1-hp"></div></div>
            <div id="p1HpText">100/100</div>
        </div>
        <div style="font-size: 40px; align-self: center; color: var(--accent-red);">VS</div>
        <div class="fighter">
            <h2 id="p2Name">---</h2>
            <div id="p2Rank" style="font-size:12px; color:#888;">等級</div>

            <div id="p2HpText">100/100</div>
        </div>
    </div>
    <div id="battleLog">系統待命中...請選擇將領並按下發動。</div>
    <div class="chart-container"><canvas id="hpChart"></canvas></div>
    <div class="footer">什年工作室《三國演義武力超百科》授權終端 // 541員全量數據導入</div>
</div>

    const p2Select = document.getElementById('p2Select');
    const battleLog = document.getElementById('battleLog');
    let hpChart;

    // 按武力排序載入下拉選單
    const sortedGenerals = [...generals].sort((a, b) => b.power - a.power);
    sortedGenerals.forEach((g) => {
        let opt1 = new Option(`${g.name} (${g.power}) - ${g.rank}`, generals.indexOf(g));
        let opt2 = new Option(`${g.name} (${g.power}) - ${g.rank}`, generals.indexOf(g));
        p1Select.add(opt1);
        p2Select.add(opt2);
    });

    function randomize() {
        p1Select.selectedIndex = Math.floor(Math.random() * generals.length);
        p2Select.selectedIndex = Math.floor(Math.random() * generals.length);
        battleLog.innerHTML = "天道已選定隨機將領。";
    }

    function initChart() {
        const ctx = document.getElementById('hpChart').getContext('2d');
        if (hpChart) hpChart.destroy();
        hpChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [0],
                datasets: [
                    { label: '先鋒 HP', data: [100], borderColor: '#00ff41', tension: 0.1 },
                    { label: '敵將 HP', data: [100], borderColor: '#ff3131', tension: 0.1 }
                ]
            },
            options: { responsive: true, scales: { y: { min: 0, max: 100 } } }
        });
    }

    function triggerShake() {
        const warroom = document.getElementById('mainWarroom');
        warroom.classList.add('shaking');
        setTimeout(() => warroom.classList.remove('shaking'), 300);
    }

async function startDuel() {
        const p1 = generals[p1Select.value];
        const p2 = generals[p2Select.value];
        document.getElementById('p1Name').innerText = p1.name;
        document.getElementById('p1Rank').innerText = p1.rank;
        document.getElementById('p2Name').innerText = p2.name;
        document.getElementById('p2Rank').innerText = p2.rank;

        let h1 = 100, h2 = 100;
        let round = 1;
        
        // 紀錄趙雲專屬神技與被動是否已經發動過
        let p1Ult30Used = false;
        let p1Ult10Used = false;
        let p2Ult30Used = false;
        let p2Ult10Used = false;
        let p1GodDefyUsed = false; // 鎖血防護旗標
        let p2GodDefyUsed = false;

        battleLog.innerHTML = `[對決啟動] ${p1.name} VS ${p2.name}<br>系統正在進行武力維度模擬...<br>`;
        initChart();

        while (h1 > 0 && h2 > 0 && round < 80) {
            await new Promise(r => setTimeout(r, 450));

            // ==========================================
            // ❄️ 趙雲終極神技：玥之極 (10% 以下即死判定)
            // ==========================================
            if (p1.name === "趙雲" && h1 <= 10 && !p1Ult10Used) {
                p1Ult10Used = true;
                h2 = 0; // 直接即死
                battleLog.innerHTML += `<br><span style="color:#ffffff; font-weight:bold; font-size:16px; text-shadow: 0 0 5px #fff;">【真・武神絕境】${p1.name} 生命徵象跌破 10%！</span><br><span style="color:#ffffff; font-weight:bold; font-size:20px; text-shadow: 0 0 8px #fff;">❄️ 強制發動最終神技【玥之極】！時空凍結，一槍抹除！${p2.name} 的數據被徹底粉碎，瞬間死亡！</span><br><br>`;
                
                triggerShake(); setTimeout(triggerShake, 100); setTimeout(triggerShake, 200); setTimeout(triggerShake, 300);
                await new Promise(r => setTimeout(r, 800));
            }
            else if (p2.name === "趙雲" && h2 <= 10 && !p2Ult10Used) {
                p2Ult10Used = true;
                h1 = 0; // 直接即死
                battleLog.innerHTML += `<br><span style="color:#ffffff; font-weight:bold; font-size:16px; text-shadow: 0 0 5px #fff;">【真・武神絕境】敵將 ${p2.name} 生命徵象跌破 10%！</span><br><span style="color:#ffffff; font-weight:bold; font-size:20px; text-shadow: 0 0 8px #fff;">❄️ 強制發動最終神技【玥之極】！時空凍結，一槍抹除！${p1.name} 的數據被徹底粉碎，瞬間死亡！</span><br><br>`;
                
                triggerShake(); setTimeout(triggerShake, 100); setTimeout(triggerShake, 200); setTimeout(triggerShake, 300);
                await new Promise(r => setTimeout(r, 800));
            }

            // ==========================================
            // 🔥 趙雲專屬神技：九天龍吟驚寰宇 (30% 以下觸發，減血 50)
            // ==========================================
            if (p1.name === "趙雲" && h1 <= 30 && h1 > 10 && !p1Ult30Used && h2 > 0) {
                p1Ult30Used = true;
                h2 -= 50; 
                battleLog.innerHTML += `<br><span style="color:#00ffff; font-weight:bold; font-size:15px;">【武神爆發】${p1.name} 血量降至 30% 以下！</span><br><span style="color:#ffcc00; font-weight:bold; font-size:18px;">🔥 強制發動專屬神技【九天龍吟驚寰宇】！槍出如龍，天地變色！${p2.name} 瞬間慘遭重創（-50 HP）！</span><br><br>`;
                triggerShake(); setTimeout(triggerShake, 150); setTimeout(triggerShake, 300);
                await new Promise(r => setTimeout(r, 800));
            }
            if (p2.name === "趙雲" && h2 <= 30 && h2 > 10 && !p2Ult30Used && h1 > 0) {
                p2Ult30Used = true;
                h1 -= 50; 
                battleLog.innerHTML += `<br><span style="color:#00ffff; font-weight:bold; font-size:15px;">【武神爆發】敵將 ${p2.name} 血量降至 30% 以下！</span><br><span style="color:#ffcc00; font-weight:bold; font-size:18px;">🔥 強制發動專屬神技【九天龍吟驚寰宇】！槍出如龍，天地變色！${p1.name} 瞬間慘遭重創（-50 HP）！</span><br><br>`;
                triggerShake(); setTimeout(triggerShake, 150); setTimeout(triggerShake, 300);
                await new Promise(r => setTimeout(r, 800));
            }

            // ==========================================
            // ⚔️ 常規攻防判定 (雙方都還活著才互砍)
            // ==========================================
            if (h1 > 0 && h2 > 0) {
                let dmg1 = Math.max(3, (p1.power * 0.12) - (p2.power * 0.04) + (Math.random() * 12 - 4));
                let dmg2 = Math.max(3, (p2.power * 0.12) - (p1.power * 0.04) + (Math.random() * 12 - 4));

                if (Math.random() > 0.5) {
                    h2 -= dmg1;
                    battleLog.innerHTML += `<span style="color:var(--text-color)">[第${round}合]</span> ${p1.name} ${moves[Math.floor(Math.random()*moves.length)]} 造成 ${Math.floor(dmg1)} 點數據損傷。<br>`;
                    triggerShake();
                } else {
                    h1 -= dmg2;
                    battleLog.innerHTML += `<span style="color:var(--accent-red)">[第${round}合]</span> ${p2.name} 咆哮猛攻，${p1.name} 承受 ${Math.floor(dmg2)} 點邏輯破壞。<br>`;
                    triggerShake();
                }
            }

            // 結算血量，確保不會出現負數
            h1 = Math.max(0, h1); h2 = Math.max(0, h2);

            // ==========================================
            // 🛡️ 趙雲專屬被動：弒神鎖血 (嚴格限定遇到「神仙流」)
            // 若對手不是神仙，趙雲 0 血就是真死了，不會觸發此段。
            // ==========================================
            if (p1.name === "趙雲" && p2.rank.includes("神仙流") && h1 === 0 && !p1GodDefyUsed) {
                h1 = 1; // 強制鎖在 1 滴血
                p1GodDefyUsed = true;
                battleLog.innerHTML += `<br><span style="color:#ffd700; font-weight:bold; font-size:16px; text-shadow: 0 0 5px #ffaa00;">【逆天改命】神仙的維度打擊降臨！但...神明之力亦無法抹殺天下第一！${p1.name} 強行鎖住最後 1 點生命！</span><br><br>`;
                triggerShake();
            }
            if (p2.name === "趙雲" && p1.rank.includes("神仙流") && h2 === 0 && !p2GodDefyUsed) {
                h2 = 1; // 強制鎖在 1 滴血
                p2GodDefyUsed = true;
                battleLog.innerHTML += `<br><span style="color:#ffd700; font-weight:bold; font-size:16px; text-shadow: 0 0 5px #ffaa00;">【逆天改命】神仙的維度打擊降臨！但...神明之力亦無法抹殺天下第一！${p2.name} 強行鎖住最後 1 點生命！</span><br><br>`;
                triggerShake();
            }

            // 更新畫面血條與圖表
            document.getElementById('p1HpBar').style.width = h1 + "%";
            document.getElementById('p2HpBar').style.width = h2 + "%";
            document.getElementById('p1HpText').innerText = Math.floor(h1) + "/100";
            document.getElementById('p2HpText').innerText = Math.floor(h2) + "/100";
            
            hpChart.data.labels.push(round);
            hpChart.data.datasets[0].data.push(h1);
            hpChart.data.datasets[1].data.push(h2);
            hpChart.update();

            battleLog.scrollTop = battleLog.scrollHeight;
            round++;
        }

        const winner = h1 > h2 ? p1.name : p2.name;
        battleLog.innerHTML += `<br><strong style="color:var(--accent-orange); font-size:22px;">[演武終結] 最終處決結果：${winner} 傲立戰場！</strong>`;
    }
    initChart();
</script>
</body>
</html>
